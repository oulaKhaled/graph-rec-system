<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Series Recommender</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: system-ui, sans-serif;
  background: #fff;
  color: #111;
  font-size: 14px;
}

header {
  padding: 20px 32px;
  border-bottom: 1px solid #e5e5e5;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

header h1 { font-size: 16px; font-weight: 600; }
header p { color: #888; font-size: 13px; }

.container { padding: 32px; }

.info-bar {
  margin-bottom: 24px;
  color: #555;
  font-size: 13px;
}

.series-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}

.series-card {
  cursor: pointer;
  border: 1px solid #e5e5e5;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  aspect-ratio: 2/3;
  background: #f5f5f5;
  transition: border-color 0.15s;
}

.series-card:hover { border-color: #111; }

.series-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.card-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  padding: 8px;
  font-size: 12px;
  color: #888;
}

.rated-badge {
  position: absolute;
  top: 6px; right: 6px;
  background: #111;
  color: #fff;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 2px;
}

.card-title-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.6);
  color: #fff;
  font-size: 11px;
  padding: 6px 8px;
  opacity: 0;
  transition: opacity 0.15s;
}

.series-card:hover .card-title-bar { opacity: 1; }

.skeleton {
  aspect-ratio: 2/3;
  border-radius: 4px;
  background: #f0f0f0;
  animation: shimmer 1.2s infinite;
}

@keyframes shimmer {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: #fff;
  border-radius: 6px;
  width: 100%; max-width: 360px;
  overflow: hidden;
  transform: translateY(12px);
  transition: transform 0.2s;
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal img {
  width: 100%; height: 200px;
  object-fit: cover; display: block;
}

.modal-placeholder {
  width: 100%; height: 200px;
  background: #f5f5f5;
  display: flex; align-items: center; justify-content: center;
  color: #888; font-size: 13px;
}

.modal-body { padding: 20px; }
.modal-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
.modal-meta { font-size: 12px; color: #888; margin-bottom: 16px; }
.rating-label { font-size: 12px; color: #555; margin-bottom: 10px; }

.stars {
  display: flex; gap: 4px;
  margin-bottom: 20px;
}

.star {
  font-size: 24px; cursor: pointer;
  color: #ddd;
  transition: color 0.1s;
  line-height: 1;
}

.star.active { color: #f5a623; }

.modal-actions { display: flex; gap: 8px; }

.btn {
  flex: 1; padding: 10px;
  border-radius: 4px;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
  border: 1px solid #e5e5e5;
  background: #fff;
  color: #111;
}

.btn:hover { background: #f5f5f5; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-primary {
  background: #111; color: #fff;
  border-color: #111;
}

.btn-primary:hover { background: #333; }

/* Loading */
.loading-screen {
  position: fixed; inset: 0;
  background: #fff;
  z-index: 200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}

.loading-screen.show { opacity: 1; pointer-events: all; }
.loading-screen p { font-size: 13px; color: #555; }

.progress-track {
  width: 200px; height: 2px;
  background: #e5e5e5; border-radius: 2px; overflow: hidden;
}

.progress-fill {
  height: 100%; background: #111;
  border-radius: 2px; width: 0%;
  transition: width 0.3s;
}

/* Results */
.results-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.results-header h2 { font-size: 15px; font-weight: 600; }
.results-header p { font-size: 12px; color: #888; margin-top: 2px; }

.recommend-btn {
  position: fixed;
  bottom: 24px; right: 24px;
  background: #111; color: #fff;
  border: none; border-radius: 4px;
  padding: 12px 20px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  transition: background 0.15s;
  z-index: 50;
}

.recommend-btn:hover { background: #333; }

.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: #111; color: #fff;
  padding: 10px 20px;
  border-radius: 4px; font-size: 13px;
  z-index: 300;
  transition: transform 0.25s;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }
.hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1>Series Recommender</h1>
  <p id="rated-count">0 series rated</p>
</header>
<div style="padding: 0 32px 16px; border-bottom: 1px solid #e5e5e5;">
  <input 
    id="username-input" 
    type="text" 
    placeholder="Enter your name to get recommendations"
    style="padding: 8px 12px; border: 1px solid #e5e5e5; border-radius: 4px; font-size: 13px; width: 280px;"
  />
</div>
<div class="container">

  <div id="browse-section">
    <div class="info-bar">Click a series to rate it, then hit Recommend.</div>
    <div class="series-grid" id="series-grid">
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
    </div>
  </div>

  <div id="results-section" class="hidden">
    <div class="results-header">
      <div>
        <h2>Recommendations</h2>
        <p id="results-sub"></p>
      </div>
      <button class="btn" onclick="resetAll()">← Back</button>
    </div>
    <div class="series-grid" id="results-grid"></div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <img id="modal-img" src="" alt=""
      onerror="this.style.display='none'; document.getElementById('modal-placeholder').style.display='flex'">
    <div id="modal-placeholder" class="modal-placeholder" style="display:none">No Poster</div>
    <div class="modal-body">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="rating-label">Your rating (1–10)</div>
      <div class="stars" id="stars">
        <span class="star" onclick="setRating(1)">★</span>
        <span class="star" onclick="setRating(2)">★</span>
        <span class="star" onclick="setRating(3)">★</span>
        <span class="star" onclick="setRating(4)">★</span>
        <span class="star" onclick="setRating(5)">★</span>
        <span class="star" onclick="setRating(6)">★</span>
        <span class="star" onclick="setRating(7)">★</span>
        <span class="star" onclick="setRating(8)">★</span>
        <span class="star" onclick="setRating(9)">★</span>
        <span class="star" onclick="setRating(10)">★</span>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="confirm-btn" onclick="confirmRating()" disabled>Confirm</button>
        <button class="btn" onclick="closeModal()">Skip</button>
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="loading-screen" id="loading-screen">
  <p id="loading-text">Loading...</p>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
</div>

<button class="recommend-btn" onclick="getRecommendations()">Recommend →</button>
<div class="toast" id="toast"></div>

<script>
const TMDB_API_KEY = "f9c822e5b42a80dd2f12f5df9589fbe9";
const API_BASE = "";
const CSV_PATH = "/static/series.csv";

let allSeries = [], ratings = {}, currentSeries = null, currentRating = 0;

async function init() {
  try {
    allSeries = await loadCSV(CSV_PATH);
    await renderGrid(allSeries, "series-grid");
  } catch (err) {
    showToast("Could not load series list");
    console.error(err);
  }
}

async function loadCSV(path) {
  const res = await fetch(path);
  const text = await res.text();
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
  return lines.slice(1).map(line => {
    const vals = line.split(",").map(v => v.trim().replace(/^"|"$/g, ""));
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || "");
    return obj;
  }).filter(s => s.tmdb_id && s.title);
}

async function renderGrid(series, gridId) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = "";
  for (const s of series) {
    const posterUrl = await fetchPoster(s.tmdb_id);
    const card = document.createElement("div");
    card.className = "series-card";
    card.dataset.id = s.tmdb_id;
    card.onclick = () => openModal(s);
    card.innerHTML = `
      ${posterUrl ? `<img src="${posterUrl}" alt="${s.title}" loading="lazy">` : `<div class="card-placeholder">${s.title}</div>`}
      <div class="card-title-bar">${s.title}</div>
      ${ratings[s.tmdb_id] ? `<div class="rated-badge">★ ${ratings[s.tmdb_id]}</div>` : ""}
    `;
    grid.appendChild(card);
  }
}

async function fetchPoster(tmdbId) {
  try {
    const res = await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${TMDB_API_KEY}`);
    const data = await res.json();
    return data.poster_path ? `https://image.tmdb.org/t/p/w342${data.poster_path}` : null;
  } catch { return null; }
}

async function openModal(series) {
  currentSeries = series;
  currentRating = ratings[series.tmdb_id] || 0;
  document.getElementById("modal-title").textContent = series.title;
  document.getElementById("modal-meta").textContent = [series.genre, series.year].filter(Boolean).join(" · ") || "";
  const posterUrl = await fetchPoster(series.tmdb_id);
  const img = document.getElementById("modal-img");
  const ph = document.getElementById("modal-placeholder");
  if (posterUrl) { img.src = posterUrl; img.style.display = "block"; ph.style.display = "none"; }
  else { img.style.display = "none"; ph.style.display = "flex"; }
  updateStars(currentRating);
  document.getElementById("confirm-btn").disabled = !currentRating;
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  currentSeries = null; currentRating = 0;
}

function handleOverlayClick(e) { if (e.target.id === "modal-overlay") closeModal(); }

function setRating(val) {
  currentRating = val;
  updateStars(val);
  document.getElementById("confirm-btn").disabled = false;
}

function updateStars(val) {
  document.querySelectorAll(".star").forEach((s, i) => s.classList.toggle("active", i < val));
}

function confirmRating() {
  if (!currentSeries || !currentRating) return;
  const title = currentSeries.title;
  const tmdbId = currentSeries.tmdb_id;
  const index = currentSeries.index;
  
  ratings[index] = currentRating;
  const card = document.querySelector(`[data-id="${index}"]`);
  if (card) {
    let badge = card.querySelector(".rated-badge");
    if (!badge) { badge = document.createElement("div"); badge.className = "rated-badge"; card.appendChild(badge); }
    badge.textContent = `★ ${currentRating}`;
  }
  document.getElementById("rated-count").textContent = `${Object.keys(ratings).length} series rated`;
  closeModal();
  console.log("title : ",title)
  console.log("tmdbId : ",tmdbId);
  console.log("index : ",index);
  

  console.log("ratings : ",ratings);
  
  showToast(`Rated: ${title}`);
}
async function getRecommendations() {
  const username = document.getElementById("username-input").value.trim();
  
  if (!username) { showToast("Please enter your name first"); return; }
  if (!Object.keys(ratings).length) { showToast("Rate at least one series first"); return; }
  
  showLoading();
  try {
    const res = await fetch(`${API_BASE}/recommend`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, ratings })  // ← username added
    });
    const data = await res.json();
    hideLoading();
    
    console.log("API response:", data);  // ← fixed from print()
    
    if (!data.recommendations) {
      showToast("No recommendations returned");
      return;
    }
    showResults(data.recommendations);
  } catch (err) {
    hideLoading();
    showToast("Could not reach the model API");
    console.error(err);
  }
}

async function showResults(ids) {
  console.log("showResults fun is calling");
  
  document.getElementById("browse-section").classList.add("hidden");
  const recommended = ids.map(id => allSeries.find(s => String(s.tmdb_id) === String(id))).filter(Boolean);
  document.getElementById("results-sub").textContent =
    `${recommended.length} picks based on your ${Object.keys(ratings).length} ratings`;
  await renderGrid(recommended, "results-grid");
  document.getElementById("results-section").classList.remove("hidden");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function resetAll() {
  document.getElementById("results-section").classList.add("hidden");
  document.getElementById("browse-section").classList.remove("hidden");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

const loadingSteps = [[0,"Loading ratings..."],[25,"Running graph network..."],[55,"Computing similarities..."],[80,"Preparing results..."]];

function showLoading() {
  document.getElementById("loading-screen").classList.add("show");
  let i = 0;
  const iv = setInterval(() => {
    if (i < loadingSteps.length) {
      document.getElementById("progress-fill").style.width = loadingSteps[i][0] + "%";
      document.getElementById("loading-text").textContent = loadingSteps[i][1];
      i++;
    } else clearInterval(iv);
  }, 600);
}

function hideLoading() {
  document.getElementById("progress-fill").style.width = "100%";
  setTimeout(() => { document.getElementById("loading-screen").classList.remove("show"); document.getElementById("progress-fill").style.width = "0%"; }, 300);
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
  if (e.key === "Enter" && currentSeries && currentRating) confirmRating();
});

init();
</script>
</body>
</html>
